# Render.com Blueprint -- one-click deploy for the Second Brain backend.
#
# Usage:
#   1. Push this repo to GitHub.
#   2. Render -> "New +" -> "Blueprint" -> select the repo.
#   3. Render reads this file and provisions the service.
#   4. Fill in the `sync: false` secrets in the dashboard
#      (Render will NOT auto-generate values for these).
#
# Anything declared with `generateValue: true` is auto-generated by
# Render once at provisioning time and never echoed back -- safe to
# keep here. Anything with `sync: false` is a placeholder you set
# manually in the dashboard (real secrets from Supabase / Slack /
# HydraDB / OpenAI).
#
# This Blueprint covers ONLY the backend. The Vercel frontend is
# deployed separately (see DEPLOYMENT.md).

services:
  - type: web
    name: second-brain-api
    runtime: python
    plan: starter          # free tier sleeps; starter is $7/mo and stays warm
    rootDir: backend
    healthCheckPath: /api/health
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2
    envVars:
      # ---- Auto-generated by Render ----
      - key: APP_API_KEY
        generateValue: true
      - key: SLACK_OAUTH_STATE_SECRET
        generateValue: true

      # ---- Set these in the Render dashboard (Blueprint placeholders) ----
      - key: HYDRADB_API_KEY
        sync: false
      - key: HYDRADB_TENANT_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SLACK_CLIENT_ID
        sync: false
      - key: SLACK_CLIENT_SECRET
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: SLACK_REDIRECT_URI
        sync: false        # https://<this-service>.onrender.com/api/slack/oauth/callback
      - key: FRONTEND_BASE_URL
        sync: false        # https://<your-frontend>.vercel.app
      - key: CORS_ORIGINS
        sync: false        # comma-separated; usually same as FRONTEND_BASE_URL

      # ---- Sensible production defaults ----
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: REALTIME_INGEST_ENABLED
        value: "true"
      - key: AUTO_INGEST
        value: "false"     # let the user opt in via the UI; enable later
      - key: QUERY_CACHE_ENABLED
        value: "true"
      - key: RATE_LIMIT_PER_5_MIN
        value: "20"