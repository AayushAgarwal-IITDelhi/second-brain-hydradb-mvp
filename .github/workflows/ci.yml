name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('backend/requirements*.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pytest with coverage
        env:
          APP_API_KEY: test-secret-key
          HYDRADB_API_KEY: ci-dummy-hydradb-key
          HYDRADB_TENANT_ID: ci-dummy-tenant
          OPENAI_API_KEY: ci-dummy-openai-key
          QUERY_CACHE_ENABLED: "false"
          AUTO_INGEST: "false"
          RATE_LIMIT_PER_5_MIN: "10000"
        run: pytest tests/ --cov=. --cov-report=term-missing --cov-fail-under=85

  frontend-tests:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint (if script present)
        run: npm run lint --if-present

  smoke-validation:
    name: Smoke import check
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('backend/requirements*.txt') }}
          restore-keys: pip-

      - name: Install runtime dependencies
        run: pip install -r backend/requirements.txt

      - name: Check .env.example exists
        run: test -f backend/.env.example

      - name: Smoke import check
        env:
          APP_API_KEY: ci-dummy-app-key
          HYDRADB_API_KEY: ci-dummy-hydradb-key
          HYDRADB_TENANT_ID: ci-dummy-tenant
          OPENAI_API_KEY: ci-dummy-openai-key
        run: |
          cd backend
          python -c "
          import logging_config, request_context
          import auth, errors, recall, scheduler
          import hydradb_client, realtime_ingest
          print('imports OK')
          "
